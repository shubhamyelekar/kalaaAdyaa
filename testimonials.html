<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Read student testimonials for Adya Yoga with Vaishnavi Simha." />
    <meta property="og:title" content="Student Stories | Adya Yoga" />
    <meta property="og:description" content="Student experiences and reflections from Adya Yoga classes." />
    <meta property="og:type" content="website" />
    <title>Student Stories | Adya Yoga</title>
    <link rel="icon" type="image/svg+xml" href="assets/adya-yoga-logo.svg" />
    <link rel="icon" type="image/png" sizes="512x512" href="assets/adya-yoga-logo.png" />
    <link rel="shortcut icon" type="image/svg+xml" href="assets/adya-yoga-logo.svg" />
    <link rel="apple-touch-icon" href="assets/adya-yoga-logo.jpg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ivory: "#fbf7ee",
              paper: "#fffdf8",
              mist: "#e9eee3",
              sage: "#6f8064",
              forest: "#18362d",
              moss: "#385248",
              clay: "#b75f3f",
              amber: "#d0a85a",
              ink: "#17211d"
            },
            fontFamily: {
              display: ["Georgia", "Times New Roman", "serif"],
              body: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"]
            },
            boxShadow: {
              soft: "0 24px 70px rgba(18, 39, 32, 0.16)"
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-ivory font-body text-ink antialiased">
    <header class="flex items-center justify-between px-5 py-5 text-forest md:px-10 lg:px-14">
      <a class="flex items-center gap-3 font-extrabold" href="index.html" aria-label="Adya Yoga home">
        <img class="size-10 rounded-full bg-paper" src="assets/adya-yoga-logo.svg" alt="" />
        <span>Adya Yoga</span>
      </a>
      <a class="rounded-full bg-forest px-5 py-3 text-sm font-extrabold text-paper transition hover:-translate-y-0.5" href="index.html">Back home</a>
    </header>

    <main>
      <section class="ganga-texture-section px-5 py-16 md:px-10 md:py-24 lg:px-14">
        <div class="max-w-3xl">
          <p class="mb-3 text-xs font-black uppercase text-clay">Student stories</p>
          <h1 class="font-display text-5xl leading-tight text-forest md:text-7xl">Every steady practice leaves a trace.</h1>
          <p class="mt-6 text-lg leading-8 text-ink/62">Read through student experiences from Adya Yoga classes. These stories are loaded from the same static testimonials file used on the home page.</p>
        </div>
      </section>

      <section class="px-5 py-16 md:px-10 md:py-24 lg:px-14">
        <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-3" data-testimonial-list data-testimonial-layout="grid"></div>
      </section>
    </main>

    <footer class="flex flex-col gap-6 bg-[#112720] px-5 py-10 text-paper md:flex-row md:items-end md:justify-between md:px-10 lg:px-14">
      <div>
        <a class="flex items-center gap-3 font-extrabold" href="index.html"><img class="size-10 rounded-full bg-paper" src="assets/adya-yoga-logo.svg" alt="" /><span>Adya Yoga</span></a>
        <p class="mt-3 text-paper/68">Traditional Yoga with Vaishnavi Simha.</p>
      </div>
      <a class="border-b border-paper/40 font-bold" href="mailto:info@kalaaadyayoga.com">info@kalaaadyayoga.com</a>
    </footer>

    <script src="testimonials.js"></script>
    <script src="site.js"></script>
