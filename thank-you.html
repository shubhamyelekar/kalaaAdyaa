<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Thank you for contacting Adya Yoga." />
    <meta property="og:title" content="Thank you | Adya Yoga" />
    <meta property="og:description" content="Your Adya Yoga request has been received." />
    <meta property="og:type" content="website" />
    <title>Thank you | Adya Yoga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ivory: "#fbf7ee",
              paper: "#fffdf8",
              mist: "#e9eee3",
              sage: "#6f8064",
              forest: "#18362d",
              clay: "#b75f3f",
              amber: "#d0a85a",
              ink: "#17211d"
            },
            fontFamily: {
              display: ["Georgia", "Times New Roman", "serif"],
              body: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"]
            },
            boxShadow: {
              soft: "0 24px 70px rgba(18, 39, 32, 0.16)"
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-ivory font-body text-ink antialiased">
    <main class="ganga-texture-section grid min-h-screen place-items-center px-5 py-12">
      <section class="w-full max-w-3xl rounded-lg border border-forest/15 bg-paper/88 p-7 text-center shadow-soft backdrop-blur md:p-12">
        <a class="mx-auto mb-8 flex w-fit items-center gap-3 font-extrabold text-forest" href="index.html" aria-label="Adya Yoga home">
          <img class="size-12 rounded-full bg-paper" src="assets/adya-yoga-logo.svg" alt="" />
          <span>Adya Yoga</span>
        </a>

        <p class="mb-3 text-xs font-black uppercase text-clay">Request received</p>
        <h1 class="font-display text-5xl leading-tight text-forest md:text-7xl">Thank you.</h1>
        <p class="mx-auto mt-6 max-w-xl text-lg leading-8 text-ink/64">
          Your message has reached Adya Yoga. Vaishnavi will review your request and get back to you soon.
        </p>

        <div class="mt-9 flex flex-col justify-center gap-3 sm:flex-row">
          <a class="inline-flex min-h-12 items-center justify-center rounded-full bg-forest px-6 font-extrabold text-paper transition hover:-translate-y-0.5" href="index.html">Back to home</a>
          <a class="inline-flex min-h-12 items-center justify-center rounded-full border border-forest/20 px-6 font-extrabold text-forest transition hover:-translate-y-0.5" href="index.html#schedule">View schedule</a>
        </div>
      </section>
    </main>
  </body>
</html>
